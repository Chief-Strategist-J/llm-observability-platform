version: "3.9"

services:
  inngest:
    image: inngest/inngest:latest
    container_name: inngest-instance-0
    environment:
      INSTANCE_ID: "0"
      INNGEST_PORT: "8288"
      INNGEST_SIGNING_KEY: "local-dev-key-change-in-production"
      INNGEST_EVENT_KEY: "local-dev-event-key"
    command:
      - "dev"
      - "-u"
      - "http://localhost:8288"
    networks:
      - temporal-network
      - observability-network

    labels:
      traefik.enable: "true"
      traefik.docker.network: "temporal-network"
      
      traefik.http.routers.inngest-0.rule: "Host(`inngest-0.localhost`)"
      traefik.http.routers.inngest-0.entrypoints: "web,websecure"
      traefik.http.routers.inngest-0.service: "inngest-0"
      traefik.http.routers.inngest-0.tls: "true"
      traefik.http.routers.inngest-0.tls.certresolver: "letsencrypt"
      traefik.http.routers.inngest-0.middlewares: "security-headers-0,rate-limit-0,compression-0"
      
      traefik.http.routers.inngest-scaibu-0.rule: "Host(`scaibu.inngest`)"
      traefik.http.routers.inngest-scaibu-0.entrypoints: "traefik"
      traefik.http.routers.inngest-scaibu-0.service: "inngest-0"
      traefik.http.routers.inngest-scaibu-0.middlewares: "security-headers-0"
      
      traefik.http.services.inngest-0.loadbalancer.server.port: "8288"
      traefik.http.services.inngest-0.loadbalancer.healthcheck.path: "/health"
      traefik.http.services.inngest-0.loadbalancer.healthcheck.interval: "30s"
      
      prometheus.io.scrape: "false"
      loki.source: "docker"
      loki.job: "inngest-0"
    
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 256m
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8288/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  temporal-network:
    external: true
  observability-network:
    external: true
