    container_name: messaging-postgres-4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: messaging
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    networks:
      - messaging-network
    ports:
