version: "3.9"

services:
  messaging-sdk:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: messaging-sdk
    environment:
      - POSTGRES_DSN=postgresql://postgres:postgres@postgres:5432/messaging
      - MONGODB_URI=mongodb://admin:admin@mongodb:27017/
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
      - REDIS_URL=redis://redis:6379/
      - BATCH_SIZE=2000
      - POSTGRES_SHARDS=8
      - MONGO_SHARDS=8
      - LOGICAL_SHARDS_PER_INSTANCE=8
      - ADAPTIVE_BATCHING=true
      - MAX_LATENCY_MS=10
      - BENCHMARK_MODE=false
      - TEST_MODE=full
      - WORKER_ID=1
      - POSTGRES_MINCONN=20
      - POSTGRES_MAXCONN=100
      - UVICORN_WORKERS=3
      - IDEMPOTENCY_TTL=300
    networks:
      - messaging-network
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - postgres-1
      - postgres-2
      - postgres-3
      - postgres-4
      - postgres-5
      - postgres-6
      - postgres-7
      - mongodb
      - mongodb-1
      - mongodb-2
      - mongodb-3
      - mongodb-4
      - mongodb-5
      - mongodb-6
      - mongodb-7
      - redis
      - kafka
      - schema-registry
    volumes:
      - .:/app
      - /app/.pytest_cache
    command: tail -f /dev/null
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  messaging-sdk-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: messaging-sdk-2
    environment:
      - POSTGRES_DSN=postgresql://postgres:postgres@postgres:5432/messaging
      - MONGODB_URI=mongodb://admin:admin@mongodb:27017/
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
      - REDIS_URL=redis://redis:6379/
      - BATCH_SIZE=2000
      - POSTGRES_SHARDS=8
      - MONGO_SHARDS=8
      - LOGICAL_SHARDS_PER_INSTANCE=8
      - ADAPTIVE_BATCHING=true
      - MAX_LATENCY_MS=10
      - BENCHMARK_MODE=false
      - TEST_MODE=full
      - WORKER_ID=2
      - POSTGRES_MINCONN=20
      - POSTGRES_MAXCONN=100
      - UVICORN_WORKERS=3
      - IDEMPOTENCY_TTL=300
    networks:
      - messaging-network
    ports:
      - "8002:8001"
    depends_on:
      - postgres
      - postgres-1
      - postgres-2
      - postgres-3
      - postgres-4
      - postgres-5
      - postgres-6
      - postgres-7
      - mongodb
      - mongodb-1
      - mongodb-2
      - mongodb-3
      - mongodb-4
      - mongodb-5
      - mongodb-6
      - mongodb-7
      - redis
      - kafka
      - schema-registry
    volumes:
      - .:/app
      - /app/.pytest_cache
    command: tail -f /dev/null
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  postgres:
    image: postgres:15-alpine
    container_name: messaging-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: messaging
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    networks:
      - messaging-network
    ports:
      - "5433:5432"
    volumes:
      - ./postgresql.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  postgres-1:
    image: postgres:15-alpine
    container_name: messaging-postgres-1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: messaging
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    networks:
      - messaging-network
    ports:
      - "5434:5432"
    volumes:
      - ./postgresql.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
