services:
  # Distributed Trace Analysis Engine
  dtae-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      - RUST_LOG=info
      - DTAE_BIND_ADDR=0.0.0.0:8090
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    depends_on:
      - dtae-server
      - tempo

  # Grafana Tempo (Trace Storage)
  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200" # Tempo API

  # Jaeger (Query/UI)
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # Jaeger UI
      - "14268:14268" # Jaeger collector
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  # Development Web UI with hot-reload
  dtae-web-dev:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
      - ./web/package.json:/app/package.json
      - ./web/vite.config.ts:/app/vite.config.ts
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8090
    depends_on:
      - dtae-server
    command: npm run dev -- --host 0.0.0.0

  # Simple Build Monitoring
  build-monitor:
    image: alpine:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: |
      sh -c "
      apk add --no-cache docker curl
      echo 'Build monitoring started at: $$(date)'
      while true; do
        echo '=== Build Metrics ==='
        docker images --format 'table {{.Repository}}\t{{.Tag}}\t{{.Size}}\t{{.CreatedAt}}' | head -10
        echo ''
        echo '=== Container Status ==='
        docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
        echo ''
        echo '=== System Usage ==='
        docker system df
        echo ''
        curl -s http://localhost:5173 > /dev/null && echo 'Web UI: OK' || echo 'Web UI: ERROR'
        echo 'Next check in 60 seconds...'
        echo ''
        sleep 60
      done
      "
    depends_on:
      - dtae-web-dev
