- name: smoke_test_verification
  hosts: all
  tasks:
    - name: verify_api_endpoint
      uri:
        url: "http://{{ inventory_hostname }}:8000/api/v1/status"
        status_code: 200
      register: api_check
      retries: 5
      delay: 5
      until: api_check.status == 200
    - name: verify_metrics_exporter
      wait_for:
        port: 9090
        state: started
        timeout: 30
    - name: verify_log_stream
      command: "curl -s http://{{ inventory_hostname }}:3100/ready"
      register: loki_check
      failed_when: "'ready' not in loki_check.stdout"
