- name: orchestrate_app_deployment
  hosts: all
  serial: "50%"
  max_fail_percentage: 10
  tasks:
    - name: deployment_block
      block:
        - name: pre_deployment_validation
          uri:
            url: "http://{{ inventory_hostname }}:8000/health"
            status_code: 200
          register: pre_check
        - name: update_app_configuration
          template:
            src: templates/config.j2
            dest: /etc/observability/config.yaml
          notify: restart_service
        - name: pull_new_version
          docker_container:
            name: observability-service
            image: "observability-service:{{ app_version }}"
            state: started
            restart: yes
        - name: post_deployment_validation
          wait_for:
            port: 8000
            delay: 10
            state: started
        - name: health_check_validation
          uri:
            url: "http://{{ inventory_hostname }}:8000/ready"
            status_code: 200
          register: health_check
          until: health_check.status == 200
          retries: 5
          delay: 5
      rescue:
        - name: rollback_on_failure
          docker_container:
            name: observability-service
            image: "observability-service:stable"
            state: started
            restart: yes
        - name: notify_failure
          debug:
            msg: "Deployment failed on {{ inventory_hostname }}. Rollback initiated."
      always:
        - name: cleanup_temporary_artifacts
          file:
            path: /tmp/deploy_cache
            state: absent
  handlers:
    - name: restart_service
      docker_container:
        name: observability-service
        state: restarted
