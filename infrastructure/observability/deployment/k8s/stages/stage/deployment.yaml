apiVersion: apps/v1
kind: Deployment
metadata:
  name: observability-service
  namespace: observability
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: observability-service
  template:
    metadata:
      labels:
        app: observability-service
    spec:
      containers:
      - name: observability-service
        image: observability-service:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: storage
          mountPath: /data
        env:
        - name: ENV
          value: production
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: observability-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: observability-service
  namespace: observability
spec:
  selector:
    app: observability-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
