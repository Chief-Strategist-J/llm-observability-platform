apiVersion: apps/v1
kind: Deployment
metadata:
  name: quality-api
  namespace: code-quality
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quality-api
  template:
    metadata:
      labels:
        app: quality-api
    spec:
      containers:
      - name: quality-api
        image: quality-api:latest
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: quality-secrets
              key: database-url
        - name: SONARQUBE_URL
          value: "http://sonarqube:9000"
        - name: SONARQUBE_TOKEN
          valueFrom:
            secretKeyRef:
              name: quality-secrets
              key: sonarqube-token
        - name: FLASK_ENV
          value: "production"
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: quality-api
  namespace: code-quality
spec:
  selector:
    app: quality-api
  ports:
  - port: 5000
    targetPort: 5000
  type: ClusterIP

---
apiVersion: v1
kind: Secret
metadata:
  name: quality-secrets
  namespace: code-quality
type: Opaque
data:
