apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quality-ingress
  namespace: code-quality
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - sonarqube.example.com
    - api.quality.example.com
    secretName: quality-tls
  rules:
  - host: sonarqube.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sonarqube
            port:
              number: 9000
  - host: api.quality.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: quality-api
            port:
              number: 5000
