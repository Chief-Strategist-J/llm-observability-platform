[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output and configuration
addopts = 
    -v
    --tb=short
    --strict-markers
    --strict-config
    --disable-warnings
    --color=yes
    --durations=10
    --alluredir=allure-results
    --cov=domain,application,infrastructure,adapters,shared,analysis-tools
    --cov-report=xml
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=80

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    critical: Critical production-breaking tests
    security: Security-related tests
    performance: Performance tests
    slow: Slow running tests
    docker: Tests requiring Docker
    database: Tests requiring database
    external_api: Tests requiring external API calls
    skip_go_analyzer: Skip Go analyzer tests (tool not implemented)
    skip_rust_analyzer: Skip Rust analyzer tests (tool not implemented)

# Minimum version
minversion = 6.0

# Test timeout
timeout = 300

# Parallel execution (if using pytest-xdist)
# addopts = -n auto

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:distutils
    ignore::UserWarning:pkg_resources
