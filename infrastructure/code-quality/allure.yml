# Allure configuration
allure:
  results-directory: allure-results
  report-directory: allure-report
  
  # Test categories
  categories:
    - name: Critical Failures
      matched-statuses:
        - failed
      messageRegex: ".*[Cc]ritical.*"
      
    - name: Security Issues
      matched-statuses:
        - failed
      messageRegex: ".*[Ss]ecurity.*"
      
    - name: Performance Issues
      matched-statuses:
        - failed
      messageRegex: ".*[Pp]erformance.*"
      
    - name: Database Issues
      matched-statuses:
        - failed
      messageRegex: ".*[Dd]atabase.*"
      
    - name: Infrastructure Issues
      matched-statuses:
        - failed
      messageRegex: ".*[Ii]nfrastructure.*"

  # Environment information
  environment:
    python_version: "3.12"
    platform: "Linux"
    framework: "pytest"
    test_environment: "CI/CD"
    
  # Test suites
  suites:
    - name: Domain Tests
      description: "Core domain logic and business rules"
      
    - name: Application Tests
      description: "Application use cases and orchestration"
      
    - name: Infrastructure Tests
      description: "Infrastructure adapters and external integrations"
      
    - name: Critical Tests
      description: "Production-breaking scenarios and edge cases"
      
    - name: Analysis Tools Tests
      description: "Python, Go, and Rust analysis tools"

  # Severity levels
  severity:
    - name: Blocker
      description: "Blocks the entire system"
      priority: 1
      
    - name: Critical
      description: "Critical functionality broken"
      priority: 2
      
    - name: Major
      description: "Major functionality broken"
      priority: 3
      
    - name: Normal
      description: "Normal functionality broken"
      priority: 4
      
    - name: Minor
      description: "Minor issues"
      priority: 5
