version: '3.8'

services:
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - CF_ACCOUNT_ID=${CF_ACCOUNT_ID:-local-account}
      - CF_API_TOKEN=${CF_API_TOKEN:-local-token}
      - CF_EMBEDDING_MODEL=${CF_EMBEDDING_MODEL:-@cf/baai/bge-small-en-v1.5}
      - AI_DEFAULT_MODEL=${AI_DEFAULT_MODEL:-@cf/meta/llama-3.1-8b-instruct}
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
