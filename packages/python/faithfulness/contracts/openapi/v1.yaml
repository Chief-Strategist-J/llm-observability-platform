openapi: "3.0.3"
info:
  title: Faithfulness Scorer API
  version: "1.0.0"
  description: >
    Layer 3 faithfulness scoring service.
    Uses DeBERTa-v3-base NLI to measure what fraction of response sentences
    are entailed by the retrieved RAG context. Returns null when skip
    conditions are met (no context, short response, blocked finish reason).

paths:
  /health:
    get:
      summary: Health check
      operationId: health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /v1/score/faithfulness:
    post:
      summary: Score faithfulness of a response against its RAG context
      operationId: scoreFaithfulness
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScoreRequest"
      responses:
        "200":
          description: Faithfulness scoring result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreResponse"
        "422":
          description: Validation error

components:
  schemas:
    HealthResponse:
      type: object
      required: [status, model_id]
      properties:
        status:
          type: string
          example: ok
        model_id:
          type: string
          example: cross-encoder/nli-deberta-v3-base

    ScoreRequest:
      type: object
      required: [trace_id, span_id, response_text, completion_tokens]
      properties:
        trace_id:
          type: string
        span_id:
          type: string
        rag_context:
          type: string
          nullable: true
          description: >
            Retrieved context passed by the application. Null triggers skip.
        response_text:
          type: string
          description: The LLM response to score.
        completion_tokens:
          type: integer
          description: Number of completion tokens. < 10 triggers skip.
        finish_reason:
          type: string
          nullable: true
          description: >
            LLM finish reason. 'content_filter' triggers skip.

    SentenceResultSchema:
      type: object
      required: [sentence, label, entailment_prob]
      properties:
        sentence:
          type: string
        label:
          type: string
          enum: [entailment, neutral, contradiction]
        entailment_prob:
          type: number
          minimum: 0.0
          maximum: 1.0

    ScoreResponse:
      type: object
      required: [trace_id, span_id, skipped, sentence_results]
      properties:
        trace_id:
          type: string
        span_id:
          type: string
        score:
          type: number
          nullable: true
          minimum: 0.0
          maximum: 1.0
          description: >
            Fraction of qualifying sentences labelled entailment.
            Null when skipped.
        skipped:
          type: boolean
        skip_reason:
          type: string
          nullable: true
          enum:
            - rag_context_null
            - rag_context_too_short
            - completion_tokens_too_few
            - no_qualifying_sentences
            - finish_reason_blocked
            - null
        total_qualifying:
          type: integer
          nullable: true
        entailed_count:
          type: integer
          nullable: true
        sentence_results:
          type: array
          items:
            $ref: "#/components/schemas/SentenceResultSchema"
