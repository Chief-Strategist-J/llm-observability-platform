version: "3.9"

services:
  faithfulness:
    build:
      context: ../..
      dockerfile: build/Dockerfile
    image: chiefj/faithfulness:latest
    container_name: faithfulness
    ports:
      - "8006:8006"
    environment:
      - NLI_MODEL_ID=cross-encoder/nli-deberta-v3-base
      - SPACY_MODEL=en_core_web_sm

    networks:
      - llm-observability
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

networks:
  llm-observability:
    external: true
