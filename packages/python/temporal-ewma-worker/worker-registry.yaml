workers:
  - name: temporal-ewma-worker
    type: temporal
    language: python
    task_queue: ewma-tasks
    owner: "@data-team"
    stage: 1
    workflows:
      - EwmaBaselineUpdate
      - WeeklyIntegrityCheck
      - RetroactivePriceCorrection
    activities:
      - fetch_active_pairs
      - fetch_cost_history
      - fetch_global_model_avg
      - fetch_current_cost_1h
      - fetch_cost_by_cluster_1h
      - get_baseline
      - upsert_baseline
      - publish_anomaly_alert
      - fetch_active_keys
      - verify_key_integrity
      - fetch_spans_for_correction
      - apply_price_corrections

