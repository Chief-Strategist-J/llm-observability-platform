openapi: 3.0.3
info:
  title: Temporal EWMA Worker API
  version: 1.0.0
paths:
  /health:
    get:
      summary: Health check endpoint
      responses:
        '200':
          description: Health and configuration details
  /trigger:
    post:
      summary: Trigger the EWMA baseline update workflow on-demand
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                force_hour:
                  type: integer
                  minimum: 0
                  maximum: 167
      responses:
        '200':
          description: Workflow triggered successfully
        '400':
          description: Invalid input or missing configuration
        '500':
          description: Internal server error triggering workflow
