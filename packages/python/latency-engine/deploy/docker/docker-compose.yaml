version: "3.9"
services:
  latency-engine:
    build:
      context: ../../
      dockerfile: build/Dockerfile
    ports:
      - "8002:8002"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_CONSUMER_GROUP: latency-engine-cg
      KAFKA_TOPIC_INPUT: llm.spans.raw
      REDIS_URL: redis://redis:6379/0
      SLO_CONFIG_PATH: src/slo_config.yaml
      HEALTH_PORT: 8002
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - llm_obs_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - llm_obs_network

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - llm_obs_network

networks:
  llm_obs_network:
    name: llm_obs_network
    driver: bridge
