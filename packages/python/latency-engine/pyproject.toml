[project]
name = "latency-engine"
version = "0.1.0"
description = "Kafka consumer worker for real-time latency and SLO tracking"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "confluent-kafka>=2.0.0",
    "redis>=5.0.0",
    "ddsketch>=2.0.0",
    "protobuf>=4.0.0",
    "PyYAML>=6.0",
    "opentelemetry-api>=1.26.0",
    "opentelemetry-sdk>=1.26.0",
    "clickhouse-connect>=0.6.0",
    "fastapi>=0.100.0",
    "uvicorn>=0.22.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.1.0",
    "pytest-asyncio>=0.23.0",
    "mypy>=1.8.0",
    "ruff>=0.2.0",
    "httpx2",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
