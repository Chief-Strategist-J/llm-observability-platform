version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: forecast-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: llm_observability
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    container_name: forecast-redis-test
    ports:
      - "6380:6379"

  clickhouse:
    image: clickhouse/clickhouse-server:23.8-alpine
    container_name: forecast-clickhouse-test
    ports:
      - "8124:8123"
    environment:
      CLICKHOUSE_DB: llm_observability
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""

  forecast-test-runner:
    build:
      context: ../../
      dockerfile: build/Dockerfile.test
    container_name: forecast-test-runner
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=llm_observability
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - CLICKHOUSE_DATABASE=llm_observability
      - REDIS_URL=redis://redis:6379/0
      - TEMPORAL_HOST=temporal:7233
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - INSTRUMENTATION_SDK_URL=http://sdk:8000
      - TIMESFM_REPO_ID=google/timesfm-1.0-200m
      - TIMESFM_BACKEND=cpu
      - INTERNAL_JWT_SECRET=super-secret-key
    depends_on:
      - postgres
      - redis
      - clickhouse
