asyncapi: 2.6.0
info:
  title: Cost Anomaly Alerts Event
  version: "1"
  description: Cost anomaly alerts consumed by alert-engine
channels:
  alerts.cost.anomaly:
    subscribe:
      operationId: consumeCostAnomalyAlerts
      message:
        name: CostAnomalyAlertEvent
        contentType: application/json
        headers:
          type: object
          properties:
            traceparent:
              type: string
              description: W3C Trace Context traceparent header
            tracestate:
              type: string
              description: W3C Trace Context tracestate header
        payload:
          type: object
          required:
            - service
            - model
            - hour_of_week
            - current_cost
            - ewma_value
            - threshold_value
            - sample_count
            - timestamp
            - cluster_drilldown
          properties:
            service:
              type: string
            model:
              type: string
            hour_of_week:
              type: integer
            current_cost:
              type: number
            ewma_value:
              type: number
            threshold_value:
              type: number
            sample_count:
              type: integer
            timestamp:
              type: string
              format: date-time
            is_cold_start:
              type: boolean
            cluster_drilldown:
              type: array
              items:
                type: object
                required:
                  - cluster_id
                  - cost
                properties:
                  cluster_id:
                    type: string
                  cost:
                    type: number
consumer_group: alert-engine-group
version: 1
