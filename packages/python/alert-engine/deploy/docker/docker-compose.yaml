version: "3.9"
services:
  alert-engine:
    build:
      context: ../../
      dockerfile: build/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_CONSUMER_GROUP: alert-engine-group
      KAFKA_TOPICS: alerts.budget,alerts.cost.anomaly
      REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ewma_db
      SLACK_WEBHOOK_URL: http://localhost:8080/mock-slack
      PAGERDUTY_ROUTING_KEY: mock-pagerduty-routing-key
      SERVICE_OWNERS_FILE_PATH: /app/service_owners.yaml
      PROMETHEUS_METRICS_PORT: 9464
      HEALTH_CHECK_PORT: 8001
    ports:
      - "8001:8001"
      - "9464:9464"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ewma_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ewma_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 3s
      retries: 5
