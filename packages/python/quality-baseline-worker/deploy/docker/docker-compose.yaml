version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: quality-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quality_baseline_db
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quality_baseline_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: quality-clickhouse
    ports:
      - "9010:9000"
      - "8130:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quality-redis
    ports:
      - "6390:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.22.4
    container_name: quality-temporal
    ports:
      - "7240:7233"
      - "8090:8080"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "timeout", "5", "bash", "-c", "</dev/tcp/temporal/7233"]
      interval: 10s
      timeout: 5s
      retries: 5

  quality-worker:
    build:
      context: ../..
      dockerfile: build/Dockerfile
    container_name: quality-baseline-worker
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
    ports:
      - "8080:8000"
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USERNAME=default
      - CLICKHOUSE_PASSWORD=
      - CLICKHOUSE_DATABASE=default
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_DSN=postgresql://postgres:postgres@postgres:5432/quality_baseline_db
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - TEMPORAL_TASK_QUEUE=quality-baseline-tasks

volumes:
  postgres_data:
  clickhouse_data:
  redis_data:
