openapi: 3.1.0
info:
  title: LLM Observability Raw Spans API
  version: 1.0.0
  description: REST API for synchronous ingestion of raw LLM observability spans.

servers:
  - url: https://api.llm-observability.local/v1
    description: Ingestion endpoint

paths:
  /spans:
    post:
      summary: Ingest a new LLM observability span
      operationId: recordSpan
      tags:
        - Ingestion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LLMSpan'
      responses:
        '202':
          description: Span accepted and enqueued for processing.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    default: true
                  span_warnings:
                    type: array
                    items:
                      type: string
                    description: Populated if the span passes V-rules but triggers W-rules.
        '400':
          description: Span rejected due to V-series validation rule failure.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  rule:
                    type: string
                    example: "RULE-V-02"

  /instrumentation/init:
    post:
      summary: Initialize auto-instrumentation
      operationId: initInstrumentation
      tags:
        - Management
      responses:
        '200':
          description: Auto-instrumentation initialized successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /instrumentation/uninstrument:
    post:
      summary: Disable all auto-instrumentation
      operationId: uninstrumentAll
      tags:
        - Management
      responses:
        '200':
          description: All instrumentation disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /instrumentation/detect:
    post:
      summary: Detect provider and model from a sample request
      operationId: detectProvider
      tags:
        - Discovery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  example: "https://api.openai.com/v1/chat/completions"
                body:
                  type: string
                  example: '{"model": "gpt-4"}'
      responses:
        '200':
          description: Detection result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider:
                    type: string
                    example: "openai"
                  model:
                    type: string
                    example: "gpt-4"

  /instrumentation/test-call:
    post:
      summary: Trigger a sample LLM call to verify instrumentation
      operationId: triggerTestCall
      tags:
        - Verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                method:
                  type: string
                  enum: [sdk, httpx, requests]
                provider:
                  type: string
                  enum: [openai, anthropic]
      responses:
        '200':
          description: Test call completed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
  /token-counting/count:
    post:
      summary: Count prompt tokens using tiktoken or model family heuristics
      operationId: countTokens
      tags:
        - Utilities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - prompt
                - model
              properties:
                prompt:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: object
                  description: Prompt string or list of chat messages or image contents
                model:
                  type: string
                  example: "gpt-4"
                provider:
                  type: string
                  example: "openai"
      responses:
        '200':
          description: Successful token count calculation.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    type: integer
                    example: 10
                  method:
                    type: string
                    example: "tiktoken"
  /streaming/test-stream-call:
    post:
      summary: Trigger a mock streaming call to verify streaming instrumentation
      operationId: triggerTestStreamCall
      tags:
        - Verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - provider
              properties:
                provider:
                  type: string
                  enum: [openai, anthropic]
                chunks:
                  type: array
                  items:
                    type: string
                  description: Custom chunks to yield in the mock stream
      responses:
        '200':
          description: Streaming chunks response.
          content:
            text/event-stream:
              schema:
                type: string

  /pii-injection/scan:
    post:
      summary: Scan prompt for PII and injections
      operationId: scanPrompt
      tags:
        - Utilities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - prompt
              properties:
                prompt:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: object
                  description: Prompt string or list of chat messages
      responses:
        '200':
          description: Successful scan result
          content:
            application/json:
              schema:
                type: object
                properties:
                  pii_detected:
                    type: boolean
                    example: false
                  injection_attempt:
                    type: boolean
                    example: false

  /sampling/should-sample:
    post:
      summary: Determine if a span should be sampled
      operationId: shouldSample
      tags:
        - Utilities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - span_id
              properties:
                span_id:
                  type: string
                  format: uuid
                  example: "test-span-id"
      responses:
        '200':
          description: Successful sampling determination
          content:
            application/json:
              schema:
                type: object
                required:
                  - is_sampled
                properties:
                  is_sampled:
                    type: boolean
                    example: true

  /embeddings/embed:
    post:
      summary: Generate MiniLM embeddings for a given text
      operationId: getEmbedding
      tags:
        - Utilities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
              properties:
                text:
                  type: string
                  example: "test prompt text"
      responses:
        '200':
          description: Successful embedding generation
          content:
            application/json:
              schema:
                type: object
                required:
                  - embedding
                properties:
                  embedding:
                    type: array
                    items:
                      type: number
                    minItems: 384
                    maxItems: 384

  /fallback/track:
    post:
      summary: Track fallback retry attempt for a trace ID
      operationId: trackFallback
      tags:
        - Fallback Tracking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - trace_id
                - model
              properties:
                trace_id:
                  type: string
                  example: "uuid-v4-string"
                model:
                  type: string
                  example: "gpt-4"
      responses:
        '200':
          description: Successful fallback tracking registration
          content:
            application/json:
              schema:
                type: object
                required:
                  - retry_count
                  - attempted_models
                properties:
                  retry_count:
                    type: integer
                    example: 1
                  attempted_models:
                    type: array
                    items:
                      type: string
                    example: ["gpt-3.5", "gpt-4"]

  /fallback/clear:
    post:
      summary: Clear fallback registry state
      operationId: clearFallbackTracker
      tags:
        - Fallback Tracking
      responses:
        '200':
          description: Successful registry clearing
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                properties:
                  success:
                    type: boolean
                    example: true

  /tool-call/track:
    post:
      summary: Track tool call span cost and return trace cumulative cost
      operationId: trackToolCall
      tags:
        - Tool Call Tracking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - trace_id
                - span_id
                - cost_usd_micro
              properties:
                trace_id:
                  type: string
                  example: "uuid-v4-string"
                span_id:
                  type: string
                  example: "uuid-v4-string"
                cost_usd_micro:
                  type: integer
                  example: 1500
      responses:
        '200':
          description: Successful tool call cost tracking registration
          content:
            application/json:
              schema:
                type: object
                required:
                  - total_cost
                properties:
                  total_cost:
                    type: integer
                    example: 3000

  /tool-call/clear:
    post:
      summary: Clear tool call registry state
      operationId: clearToolCallTracker
      tags:
        - Tool Call Tracking
      responses:
        '200':
          description: Successful registry clearing
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                properties:
                  success:
                    type: boolean
                    example: true

  /metrics/init:
    post:
      summary: Initialize metrics pipeline
      operationId: initMetrics
      tags:
        - Metrics
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                port:
                  type: integer
                  nullable: true
      responses:
        '200':
          description: Metrics pipeline initialization status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsStatusResponse'

  /metrics/health:
    get:
      summary: Check metrics pipeline health
      operationId: metricsHealth
      tags:
        - Metrics
      responses:
        '200':
          description: Health status of the metrics pipeline.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsStatusResponse'

  /metrics/record:
    post:
      summary: Record metrics for a single span
      operationId: recordMetrics
      tags:
        - Metrics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordSpanMetricsRequest'
      responses:
        '200':
          description: Metrics successfully recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordSpanMetricsResponse'

  /metrics/record-batch:
    post:
      summary: Record metrics for a batch of spans
      operationId: recordMetricsBatch
      tags:
        - Metrics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - spans
              properties:
                spans:
                  type: array
                  items:
                    $ref: '#/components/schemas/RecordSpanMetricsRequest'
      responses:
        '200':
          description: Batch metrics recording result.
          content:
            application/json:
              schema:
                type: object
                required:
                  - recorded_count
                properties:
                  recorded_count:
                    type: integer

components:
  schemas:
    StatusResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
    MetricsStatusResponse:
      type: object
      required:
        - initialized
        - message
      properties:
        initialized:
          type: boolean
        message:
          type: string
    RecordSpanMetricsRequest:
      type: object
      required:
        - model
        - provider
        - service_name
        - status
        - pii_detected
        - injection_attempt
        - retry_count
      properties:
        model:
          type: string
          default: "unknown"
        provider:
          type: string
          default: "unknown"
        service_name:
          type: string
          default: "unknown"
        prompt_tokens:
          type: integer
          nullable: true
        completion_tokens:
          type: integer
          nullable: true
        cost_usd_micro:
          type: integer
          nullable: true
        latency_ms_total:
          type: integer
          nullable: true
        latency_ms_ttft:
          type: integer
          nullable: true
        finish_reason:
          type: string
          nullable: true
        status:
          type: string
          default: "success"
        pii_detected:
          type: boolean
          default: false
        injection_attempt:
          type: boolean
          default: false
        retry_count:
          type: integer
          default: 0
    RecordSpanMetricsResponse:
      type: object
      required:
        - recorded
      properties:
        recorded:
          type: boolean
        cost_usd_micro:
          type: integer
          nullable: true
        price_version:
          type: string
          nullable: true
    LLMSpan:
      $ref: '../asyncapi/schemas/span.json'
