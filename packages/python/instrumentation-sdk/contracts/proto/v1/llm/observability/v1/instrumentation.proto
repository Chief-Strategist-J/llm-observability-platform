syntax = "proto3";

package llm.observability.v1;

option go_package = "github.com/llm-observability/platform/proto/v1";
option java_package = "com.llmobservability.platform.v1";

// InstrumentationStatus represents the current state of auto-instrumentation.
enum InstrumentationStatus {
  INSTRUMENTATION_STATUS_UNSPECIFIED = 0;
  INSTRUMENTATION_STATUS_INITIALIZED = 1;
  INSTRUMENTATION_STATUS_DISABLED = 2;
  INSTRUMENTATION_STATUS_PARTIAL = 3;
}

// Service definition for remote instrumentation control
service InstrumentationControlService {
  rpc InitInstrumentation(InitInstrumentationRequest) returns (InitInstrumentationResponse);
  rpc DisableInstrumentation(DisableInstrumentationRequest) returns (DisableInstrumentationResponse);
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
  rpc DetectProvider(DetectProviderRequest) returns (DetectProviderResponse);
  rpc TriggerTestCall(TriggerTestCallRequest) returns (TriggerTestCallResponse);
  rpc TriggerTestStreamCall(TriggerTestStreamCallRequest) returns (TriggerTestStreamCallResponse);
  rpc CountTokens(CountTokensRequest) returns (CountTokensResponse);
  rpc ScanPiiInjection(ScanPiiInjectionRequest) returns (ScanPiiInjectionResponse);
  rpc ShouldSample(ShouldSampleRequest) returns (ShouldSampleResponse);
  rpc InitMetrics(InitMetricsRequest) returns (InitMetricsResponse);
  rpc GetMetricsHealth(GetMetricsHealthRequest) returns (GetMetricsHealthResponse);
  rpc RecordMetrics(RecordMetricsRequest) returns (RecordMetricsResponse);
  rpc RecordMetricsBatch(RecordMetricsBatchRequest) returns (RecordMetricsBatchResponse);
}

message InitInstrumentationRequest {
  string service_name = 1;
  string environment = 2;
}

message DisableInstrumentationRequest {}

message GetStatusRequest {}

message DetectProviderRequest {
  string url = 1;
  string body = 2;
}

message DetectProviderResponse {
  string provider = 1;
  string model = 2;
}

message TriggerTestCallRequest {
  string method = 1;
  string provider = 2;
}

message TriggerTestStreamCallRequest {
  string provider = 1;
  repeated string chunks = 2;
}

message InstrumentationResponse {

  bool success = 1;
  string message = 2;
  InstrumentationStatus status = 3;
}

message InitInstrumentationResponse {
  bool success = 1;
  string message = 2;
  InstrumentationStatus status = 3;
}

message DisableInstrumentationResponse {
  bool success = 1;
  string message = 2;
  InstrumentationStatus status = 3;
}

message GetStatusResponse {
  bool success = 1;
  string message = 2;
  InstrumentationStatus status = 3;
}

message TriggerTestCallResponse {
  bool success = 1;
  string message = 2;
  InstrumentationStatus status = 3;
}

message TriggerTestStreamCallResponse {
  bool success = 1;
  string message = 2;
  InstrumentationStatus status = 3;
}

// Event for publishing instrumentation state changes to Kafka
message InstrumentationEvent {
  string event_id = 1;
  string timestamp_utc = 2;
  string service_name = 3;
  InstrumentationStatus action = 4;
  string metadata = 5; // JSON blob for extra details
}

message CountTokensRequest {
  string prompt = 1;
  string model = 2;
  string provider = 3;
}

message CountTokensResponse {
  int32 tokens = 1;
  string method = 2;
}

message ScanPiiInjectionRequest {
  string prompt = 1;
}

message ScanPiiInjectionResponse {
  bool pii_detected = 1;
  bool injection_attempt = 2;
}

message ShouldSampleRequest {
  string span_id = 1;
}

message ShouldSampleResponse {
  bool is_sampled = 1;
}

message InitMetricsRequest {
  optional int32 port = 1;
}

message GetMetricsHealthRequest {}

message InitMetricsResponse {
  bool initialized = 1;
  string message = 2;
}

message GetMetricsHealthResponse {
  bool initialized = 1;
  string message = 2;
}

message RecordMetricsRequest {
  string model = 1;
  string provider = 2;
  string service_name = 3;
  optional int32 prompt_tokens = 4;
  optional int32 completion_tokens = 5;
  optional int64 cost_usd_micro = 6;
  optional int32 latency_ms_total = 7;
  optional int32 latency_ms_ttft = 8;
  optional string finish_reason = 9;
  string status = 10;
  bool pii_detected = 11;
  bool injection_attempt = 12;
  int32 retry_count = 13;
}

message RecordMetricsResponse {
  bool recorded = 1;
  optional int64 cost_usd_micro = 2;
  optional string price_version = 3;
}

message RecordMetricsBatchRequest {
  repeated RecordMetricsRequest spans = 1;
}

message RecordMetricsBatchResponse {
  int32 recorded_count = 1;
}

