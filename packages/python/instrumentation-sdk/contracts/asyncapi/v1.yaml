asyncapi: 2.6.0
info:
  title: LLM Observability Raw Spans
  version: 1.0.0
  description: Asynchronous contract for emitting raw LLM observability spans to Kafka.

servers:
  production:
    url: kafka.prod.internal:9092
    protocol: kafka
    description: Production Kafka Cluster

channels:
  llm.spans.raw:
    description: Topic for raw, unaggregated LLM spans emitted by instrumentation SDKs.
    publish:
      message:
        $ref: '#/components/messages/SpanMessage'
  llm.instrumentation.events:
    description: Topic for instrumentation state changes and management events.
    publish:
      message:
        $ref: '#/components/messages/InstrumentationEvent'

components:
  messages:
    SpanMessage:
      name: LLMSpan
      title: LLM Observability Span
      summary: A single observability span capturing token counts, latency, and costs.
      contentType: application/json
      payload:
        $ref: 'schemas/span.json'
    InstrumentationEvent:
      name: InstrumentationEvent
      title: Instrumentation State Change
      summary: Emitted when auto-instrumentation is initialized or disabled.
      contentType: application/json
      payload:
        type: object
        properties:
          event_id: { type: string }
          timestamp_utc: { type: string }
          service_name: { type: string }
          action: { type: string, enum: [INITIALIZED, DISABLED] }
          metadata: { type: string }

