version: '3.8'

services:
  instrumentation-api:
    build:
      context: ../../
      dockerfile: build/Dockerfile
    container_name: instrumentation-sdk-api-prod
    ports:
      - "8000:8000"
      - "3000:3000"
      - "4317:4317"
      - "9464:9464"
    environment:
      - DEPLOYMENT_ENV=production
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - POSTGRES_URL=${POSTGRES_URL}
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST}
      - REDIS_URL=${REDIS_URL}
    restart: always
