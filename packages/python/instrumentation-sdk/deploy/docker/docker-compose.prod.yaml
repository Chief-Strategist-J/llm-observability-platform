version: '3.8'

services:
  instrumentation-api:
    build:
      context: ../../
      dockerfile: build/Dockerfile
    container_name: instrumentation-sdk-api
    ports:
      - "8000:8000"
      - "3000:3000"
      - "4317:4317"
    environment:
      - DEPLOYMENT_ENV=production
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
    restart: always

  # Infrastructure services would typically be managed separately in prod, 
  # but we include placeholders if needed for a self-contained deployment.
