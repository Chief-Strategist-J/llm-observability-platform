version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  test-runner:
    build:
      context: ../../../
      dockerfile: packages/python/instrumentation-sdk/build/Dockerfile.test
    container_name: instrumentation-sdk-test-runner
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SKIP_CONSOLE_EXPORTER=true
      - SKIP_APP_INIT=true
    depends_on:
      - kafka
