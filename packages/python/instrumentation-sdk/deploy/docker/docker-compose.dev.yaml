version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2182:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres:
    image: ankane/pgvector:v0.5.0
    container_name: docker-postgres-1
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: llm_observability
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d llm_observability"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: docker-clickhouse-1
    ports:
      - "9001:9000"
      - "8123:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: docker-redis-1
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  init-kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: docker-init-kafka-1
    depends_on:
      - kafka
    entrypoint: [ "/bin/bash", "-c" ]
    command: |
      bash -c "
      echo 'Waiting for Kafka to be ready...'
      cub kafka-ready -b kafka:29092 1 30
      echo 'Creating topics from registry...'
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic llm.spans.raw.unvalidated --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic llm.spans.raw --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic llm.spans.raw.dlq --partitions 1 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic llm.spans.sampled --partitions 3 --replication-factor 1
      echo 'Topics created successfully.'
      "

volumes:
  postgres_data:
  clickhouse_data:
  redis_data:
