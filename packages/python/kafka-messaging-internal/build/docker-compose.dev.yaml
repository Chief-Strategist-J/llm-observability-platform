version: '3.8'

services:
  kafka-messaging-internal:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_RELOAD=true
      - DEPLOYMENT_ENV=development
      - OTEL_SERVICE_NAME=kafka-messaging-internal
      - OTEL_SERVICE_VERSION=1.0.0-dev
      - POSTGRES_DSN=postgresql://postgres:password@postgres:5432/kafka_events_dev
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
    volumes:
      - ./src:/app/src
      - ./pyproject.toml:/app/pyproject.toml
    depends_on:
      - postgres
      - schema-registry
    networks:
      - kafka-messaging-network

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=kafka_events_dev
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    networks:
      - kafka-messaging-network

  schema-registry:
    image: confluentinc/cp-schema-registry:7.4.0
    environment:
      - SCHEMA_REGISTRY_HOST_NAME=schema-registry
      - SCHEMA_REGISTRY_LISTENERS=http://0.0.0.0:8081
      - SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS=kafka:9092
      - SCHEMA_REGISTRY_KAFKA_TOPIC=_schemas
    ports:
      - "8081:8081"
    networks:
      - kafka-messaging-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    networks:
      - kafka-messaging-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    networks:
      - kafka-messaging-network

volumes:
  postgres_data:

networks:
  kafka-messaging-network:
    driver: bridge
