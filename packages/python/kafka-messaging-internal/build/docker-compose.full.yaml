version: '3.8'

services:
  # Main Application
  kafka-messaging-internal:
    build:
      context: ..
      dockerfile: build/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DEPLOYMENT_ENV=production
      - OTEL_SERVICE_NAME=kafka-messaging-internal
      - OTEL_SERVICE_VERSION=1.0.0
      - POSTGRES_DSN=postgresql://postgres:password@postgres:5432/kafka_events
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/kafka_events?authSource=admin
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENABLE_METRICS=true
      - ENABLE_TRACING=true
    volumes:
      - ../src:/app/src
      - ../pyproject.toml:/app/pyproject.toml
    depends_on:
      - postgres
      - mongodb
      - redis
      - tempo
      - prometheus
    networks:
      - kafka-messaging-network
      - observability
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL - Primary Database
  postgres:
    image: postgres:18
    environment:
      - POSTGRES_DB=kafka_events
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/migrations:/docker-entrypoint-initdb.d
      - ./postgresql.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    ports:
      - "5432:5432"
    networks:
      - kafka-messaging-network
      - observability
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB - Alternative Database
  mongodb:
    image: mongo:8.3
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=kafka_events
    volumes:
      - mongodb_data:/data/db
      - ./mongodb-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - "27017:27017"
    networks:
      - kafka-messaging-network
      - observability
    restart: unless-stopped

  # Redis - Queue and Idempotency
  redis:
    image: redis:8.6-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - kafka-messaging-network
      - observability
    restart: unless-stopped

  # Schema Registry
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    environment:
      - SCHEMA_REGISTRY_HOST_NAME=schema-registry
      - SCHEMA_REGISTRY_LISTENERS=http://0.0.0.0:8081
      - SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS=kafka:9092
      - SCHEMA_REGISTRY_KAFKA_TOPIC=_schemas
      - SCHEMA_REGISTRY_LOG4J_ROOT_LOGLEVEL=INFO
      - SCHEMA_REGISTRY_AVRO_COMPATIBILITY_LEVEL=backward
      - SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL=backward
    ports:
      - "8081:8081"
    networks:
      - kafka-messaging-network
      - observability
    depends_on:
      - kafka
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/subjects || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    networks:
      - kafka-messaging-network
      - observability
    restart: unless-stopped

  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    networks:
      - kafka-messaging-network
      - observability
    restart: unless-stopped

  # Observability Stack
  # Tempo - Distributed Tracing
  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo-config.yaml:/etc/tempo.yaml
      - tempo_data:/tmp/tempo
    ports:
      - "3200:3200"   # Tempo UI
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "9411:9411"   # Zipkin compatible
    networks:
      - observability
    restart: unless-stopped

  # Loki - Log Aggregation
  loki:
    image: grafana/loki:3.2.0
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    ports:
      - "3100:3100"   # Loki API
    networks:
      - observability
    restart: unless-stopped

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:v3.11.3
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - kafka-messaging-network
      - observability
    restart: unless-stopped

  # Grafana - Visualization Dashboard
  grafana:
    image: grafana/grafana:13.0.1
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-tempo-datasource
    ports:
      - "3000:3000"
    networks:
      - kafka-messaging-network
      - observability
    depends_on:
      - prometheus
      - tempo
      - loki
    restart: unless-stopped

  # Node Exporter - System Metrics
  node-exporter:
    image: prom/node-exporter:v1.8.2
    ports:
      - "9100:9100"
    networks:
      - kafka-messaging-network
      - observability
    restart: unless-stopped

  # PostgreSQL Exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      - DATA_SOURCE_NAME=postgresql://postgres:password@postgres:5432/kafka_events?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      - postgres
    networks:
      - kafka-messaging-network
      - observability
    restart: unless-stopped

  # MongoDB Exporter
  mongodb-exporter:
    image: percona/mongodb_exporter:v0.41.0
    environment:
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/admin
    ports:
      - "9216:9216"
    depends_on:
      - mongodb
    networks:
      - kafka-messaging-network
      - observability
    restart: unless-stopped

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  tempo_data:
  loki_data:
  prometheus_data:
  grafana_data:

networks:
  kafka-messaging-network:
    driver: bridge
  observability:
    driver: bridge
