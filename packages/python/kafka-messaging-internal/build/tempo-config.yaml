server:
  http_listen_address: 0.0.0.0
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    zipkin:
      endpoint: 0.0.0.0:9411

ingester:
  traces_idle_retention_period: 1h
  max_block_bytes: 1_000_000
  max_block_duration: 5m

compactor:
  compaction:
    compaction_window: 1h
    max_block_bytes: 1_000_000
    retain_for: 2160h # 90 days

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks

overrides:
  defaults:
    metrics:
      ingester: true
      distributor: true
      querier: true
      frontend_worker: true
      frontend: true
      generator: true
      compactor: true
