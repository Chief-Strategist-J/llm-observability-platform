# PostgreSQL Configuration - Optimized for Kafka Messaging Workload
# Migrated from infrastructure/messaging/postgresql.conf

# Connection Settings
max_connections = 400
listen_addresses = '*'

# Memory Settings (optimized for event processing)
shared_buffers = 512MB
effective_cache_size = 2GB
work_mem = 16MB

# WAL Settings (optimized for high throughput)
wal_buffers = 32MB
max_wal_size = 2GB
wal_compression = on
synchronous_commit = off

# Autovacuum Settings (optimized for event tables)
checkpoint_completion_target = 0.95
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02
full_page_writes = off

# Query Optimizer
random_page_cost = 1.1
