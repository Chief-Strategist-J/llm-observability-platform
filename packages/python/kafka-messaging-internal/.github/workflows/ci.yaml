name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      
      - name: Run linting
        run: |
          ruff check src/
          black --check src/
          mypy src/
      
      - name: Run security checks
        run: |
          bandit -r src/
          safety check

  test:
    runs-on: ubuntu-latest
    needs: lint
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: kafka_events_test
          POSTGRES_USER: test
        options: >-
          --health-cmd pg_isready -U test
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      schema-registry:
        image: confluentinc/cp-schema-registry:7.4.0
        env:
          SCHEMA_REGISTRY_HOST_NAME: schema-registry
          SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
        ports:
          - 8081:8081
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      
      - name: Run database migrations
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/kafka_events_test
        run: |
          python scripts/migrate.sh
      
      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/kafka_events_test
          TEST_SCHEMA_REGISTRY_URL: http://localhost:8081
        run: |
          python scripts/test.sh
      
      - name: Generate coverage report
        run: |
          python scripts/test.sh coverage
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./htmlcov/index.html
          flags: unittests
          name: codecov-umbrella

  contract:
    runs-on: ubuntu-latest
    needs: lint
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: kafka_events_test
          POSTGRES_USER: test
        options: >-
          --health-cmd pg_isready -U test
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      schema-registry:
        image: confluentinc/cp-schema-registry:7.4.0
        env:
          SCHEMA_REGISTRY_HOST_NAME: schema-registry
          SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
        ports:
          - 8081:8081
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      
      - name: Run database migrations
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/kafka_events_test
        run: |
          python scripts/migrate.sh
      
      - name: Start application
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/kafka_events_test
          TEST_SCHEMA_REGISTRY_URL: http://localhost:8081
        run: |
          python -m uvicorn kafka_messaging_internal.main:main --host 0.0.0.0 --port 8001 &
          sleep 5
      
      - name: Run contract tests
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/kafka_events_test
          TEST_SCHEMA_REGISTRY_URL: http://localhost:8081
        run: |
          python scripts/test.sh contract
      
      - name: Stop application
        run: |
          pkill -f "python -m uvicorn"

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./build/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
