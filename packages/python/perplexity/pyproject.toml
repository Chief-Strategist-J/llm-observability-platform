[project]
name = "perplexity"
version = "0.2.0"
description = "Layer 3 perplexity scorer — provider logprobs (primary) + GPT-2 ONNX fallback on CPU"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0.0",
    "fastapi>=0.100.0",
    "uvicorn>=0.22.0",
    "numpy>=1.26.0",
    "opentelemetry-sdk>=1.26.0",
    "opentelemetry-api>=1.26.0",
]

[project.optional-dependencies]
gpt2 = [
    "onnxruntime>=1.17.0",
    "transformers>=4.40.0",
    "optimum[onnxruntime]>=1.19.0",
    "torch>=2.2.0",
]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.1.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.24.0",
    "mypy>=1.8.0",
    "ruff>=0.2.0",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
