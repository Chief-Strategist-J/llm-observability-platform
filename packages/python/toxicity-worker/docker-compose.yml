version: '3.8'

services:
  worker:
    build:
      context: .
      dockerfile: build/Dockerfile
    ports:
      - "8008:8008"
    environment:
      - PORT=8008
      - TOXICITY_MODEL_ID=unitary/toxic-bert
    volumes:
      - ./src:/app/src
    restart: unless-stopped

  jupyter:
    build:
      context: .
      dockerfile: build/Dockerfile
    ports:
      - "8888:8888"
    environment:
      - TOXICITY_MODEL_ID=unitary/toxic-bert
      - PYTHONPATH=/app/src
    volumes:
      - .:/app
    command: [
      "jupyter", "lab",
      "--ip=0.0.0.0",
      "--port=8888",
      "--no-browser",
      "--allow-root",
      "--NotebookApp.token=''",
      "--NotebookApp.password=''"
    ]
    restart: unless-stopped
