# 6. Latency Baseline Worker
apiVersion: apps/v1
kind: Deployment
metadata:
  name: latency-baseline-worker-deployment
  namespace: llm-observability
  labels:
    app: latency-baseline-worker
    tier: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: latency-baseline-worker
  template:
    metadata:
      labels:
        app: latency-baseline-worker
        tier: worker
    spec:
      containers:
        - name: latency-baseline-worker
          image: chiefj/latency-baseline-worker:latest
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: obs-config
          env:
            - name: HEALTH_PORT
              value: "8003"
---
apiVersion: v1
kind: Service
metadata:
  name: latency-baseline-worker-service
  namespace: llm-observability
spec:
  ports:
    - port: 8003
      targetPort: 8003
  selector:
    app: latency-baseline-worker
