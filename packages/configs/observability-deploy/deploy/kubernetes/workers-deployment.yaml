# 4. Alert Engine
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-engine-deployment
  namespace: llm-observability
  labels:
    app: alert-engine
    tier: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alert-engine
  template:
    metadata:
      labels:
        app: alert-engine
        tier: worker
    spec:
      containers:
        - name: alert-engine
          image: chiefj/alert-engine:stable
          envFrom:
            - configMapRef:
                name: obs-config
          env:
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: obs-secrets
                  key: POSTGRES_URL
---
