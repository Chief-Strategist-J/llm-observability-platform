# 1. Forecast Worker
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forecast-worker-deployment
  namespace: llm-observability
  labels:
    app: forecast-worker
    tier: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forecast-worker
  template:
    metadata:
      labels:
        app: forecast-worker
        tier: worker
    spec:
      containers:
        - name: forecast-worker
          image: chiefj/forecast-worker:latest
          envFrom:
            - configMapRef:
                name: obs-config
          env:
            - name: INSTRUMENTATION_SDK_URL
              value: "http://api-service:8000"
---
# 2. Toxicity Worker
apiVersion: apps/v1
kind: Deployment
metadata:
  name: toxicity-worker-deployment
  namespace: llm-observability
  labels:
    app: toxicity-worker
    tier: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: toxicity-worker
  template:
    metadata:
      labels:
        app: toxicity-worker
        tier: worker
    spec:
      containers:
        - name: toxicity-worker
          image: chiefj/toxicity-worker:stable
          ports:
            - containerPort: 8008
---
apiVersion: v1
kind: Service
metadata:
  name: toxicity-worker-service
  namespace: llm-observability
spec:
  ports:
    - port: 8008
      targetPort: 8008
  selector:
    app: toxicity-worker
---
