apiVersion: batch/v1
kind: Job
metadata:
  name: obs-migrations-job
  namespace: llm-observability
spec:
  template:
    spec:
      containers:
        - name: migration-runner
          image: python:3.12-slim
          envFrom:
            - configMapRef:
                name: obs-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: obs-secrets
                  key: POSTGRES_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              apt-get update && apt-get install -y postgresql-client curl &&
              chmod +x /scripts/run-migrations.sh &&
              /scripts/run-migrations.sh
          volumeMounts:
            - name: script-vol
              mountPath: /scripts
            - name: sql-vol
              mountPath: /migrations
      volumes:
        - name: script-vol
          configMap:
            name: obs-migration-scripts
        - name: sql-vol
          configMap:
            name: obs-migration-sql
      restartPolicy: OnFailure
  backoffLimit: 4
