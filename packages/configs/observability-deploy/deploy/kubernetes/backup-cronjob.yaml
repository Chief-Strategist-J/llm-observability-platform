apiVersion: batch/v1
kind: CronJob
metadata:
  name: obs-backup-cronjob
  namespace: llm-observability
spec:
  schedule: "0 0 * * *" # Daily at midnight
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: backup-worker
              image: python:3.12-slim
              envFrom:
                - configMapRef:
                    name: obs-config
              env:
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: obs-secrets
                      key: POSTGRES_PASSWORD
                - name: BACKUP_DIR
                  value: /backups
              command:
                - /bin/sh
                - -c
                - |
                  apt-get update && apt-get install -y postgresql-client curl redis-tools &&
                  chmod +x /scripts/backup.sh &&
                  /scripts/backup.sh
              volumeMounts:
                - name: script-vol
                  mountPath: /scripts
                - name: backup-vol
                  mountPath: /backups
          volumes:
            - name: script-vol
              configMap:
                name: obs-backup-scripts
            - name: backup-vol
              persistentVolumeClaim:
                claimName: obs-backup-pvc
          restartPolicy: OnFailure
