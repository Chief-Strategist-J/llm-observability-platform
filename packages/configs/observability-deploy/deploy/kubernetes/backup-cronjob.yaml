apiVersion: batch/v1
kind: CronJob
metadata:
  name: obs-backup-cronjob
  namespace: llm-observability
spec:
  schedule: "0 0 * * *" # Daily at midnight
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: backup-worker
              image: python:3.12-slim
              envFrom:
                - configMapRef:
                    name: obs-config
              env:
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: obs-secrets
                      key: POSTGRES_PASSWORD
              command:
                - /bin/sh
                - -c
                - |
                  apt-get update && apt-get install -y postgresql-client curl git &&
                  git clone https://github.com/Chief-Strategist-J/llm-observability-platform.git /app &&
                  cd /app &&
                  chmod +x packages/configs/observability-deploy/scripts/backup.sh &&
                  ./packages/configs/observability-deploy/scripts/backup.sh
          restartPolicy: OnFailure
