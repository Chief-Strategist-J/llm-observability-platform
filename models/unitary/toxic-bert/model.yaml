id: "unitary/toxic-bert"
task: "sequence-classification"
framework: "onnx"
precision: "fp32"
size_bytes: 410000000
parameters: 110000000

deployment:
  memory_limit_bytes: 536870912
  hardware_platforms:
    - "cpu"
  volume_mounts:
    host_path: "~/.cache/huggingface"
    container_path: "/root/.cache/huggingface"

metadata:
  owner: "@quality-team"
  description: "BERT model trained for multi-label toxicity classification, compiled to ONNX for CPU-only inference."
