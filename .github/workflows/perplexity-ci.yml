name: perplexity-ci

on:
  push:
    branches:
      - main
    paths:
      - "packages/python/perplexity/**"
  pull_request:
    branches:
      - main
    paths:
      - "packages/python/perplexity/**"

jobs:
  test:
    name: Unit & Contract Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: packages/python/perplexity
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        env:
          SKIP_CONSOLE_EXPORTER: "true"
          SKIP_OTLP_EXPORTER: "true"
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(python3 -c "import tomllib; d=tomllib.load(open('packages/python/perplexity/pyproject.toml','rb')); print(d['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build, test inside builder, and push
        uses: docker/build-push-action@v6
        with:
          context: packages/python/perplexity
          file: packages/python/perplexity/build/Dockerfile
          push: true
          tags: |
            chiefj/perplexity:latest
            chiefj/perplexity:stable
            chiefj/perplexity:v${{ steps.version.outputs.version }}

      - name: Smoke test pushed image
        run: |
          docker pull chiefj/perplexity:latest
          docker run --rm \
            -e SKIP_CONSOLE_EXPORTER=true \
            -e SKIP_OTLP_EXPORTER=true \
            chiefj/perplexity:latest \
            python -c "from api.rest.v1.app import create_app; create_app(); print('smoke-ok')"
