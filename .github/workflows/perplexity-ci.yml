name: perplexity-ci

on:
  push:
    branches:
      - main
    paths:
      - "packages/python/perplexity/**"
  pull_request:
    branches:
      - main
    paths:
      - "packages/python/perplexity/**"

jobs:
  test:
    name: Unit & Contract Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: packages/python/perplexity
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        env:
          SKIP_CONSOLE_EXPORTER: "true"
          SKIP_OTLP_EXPORTER: "true"
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v
