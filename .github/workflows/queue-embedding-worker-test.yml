name: Test Enforcement (Queue Embedding Worker)

on:
  push:
    paths:
      - 'packages/python/queue-embedding-worker/**'
  pull_request:
    paths:
      - 'packages/python/queue-embedding-worker/**'

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd packages/python/queue-embedding-worker
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          cd packages/python/queue-embedding-worker
          ./scripts/test.sh
