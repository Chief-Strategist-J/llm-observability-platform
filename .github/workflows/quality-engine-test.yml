name: quality-engine CI

on:
  push:
    branches: [main, feature/quality-engine-kafka-consumer]
    paths:
      - "packages/python/quality-engine/**"
      - ".github/workflows/quality-engine-test.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/python/quality-engine/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python/quality-engine

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/unit -v --cov=src --cov-report=term-missing
        env:
          PYTHONPATH: src
