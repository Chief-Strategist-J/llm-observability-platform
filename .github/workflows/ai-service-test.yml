name: Test Enforcement (AI Service)

on:
  push:
    branches:
      - main
    paths:
      - 'packages/go/ai-service/**'
  pull_request:
    branches:
      - main
    paths:
      - 'packages/go/ai-service/**'

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run tests
        run: |
          cd packages/go/ai-service
          go test -v ./...
