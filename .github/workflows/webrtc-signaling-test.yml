name: Test Enforcement (WebRTC Signaling)

on:
  push:
    branches:
      - main
      - "feature/**"
    paths:
      - 'packages/python/webrtc-signaling/**'
      - '.github/workflows/webrtc-signaling-test.yml'
  pull_request:
    paths:
      - 'packages/python/webrtc-signaling/**'
      - '.github/workflows/webrtc-signaling-test.yml'

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd packages/python/webrtc-signaling
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run lint & typecheck
        run: |
          cd packages/python/webrtc-signaling
          PYTHONPATH=. ruff check src
          PYTHONPATH=. mypy src

      - name: Run tests
        run: |
          cd packages/python/webrtc-signaling
          PYTHONPATH=. pytest tests/unit/ -v --tb=short
