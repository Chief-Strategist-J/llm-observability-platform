name: Build and Publish Temporal EWMA Worker

on:
  push:
    branches:
      - main
    paths:
      - 'packages/python/temporal-ewma-worker/**'

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          cd packages/python/temporal-ewma-worker
          docker build -t chiefj/temporal-ewma-worker:latest -f build/Dockerfile .

      - name: Run Tests inside Docker Image
        run: |
          cd packages/python/temporal-ewma-worker
          docker run --entrypoint ./scripts/test.sh chiefj/temporal-ewma-worker:latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag and Push Image
        run: |
          cd packages/python/temporal-ewma-worker
          ./scripts/deploy_docker.sh
