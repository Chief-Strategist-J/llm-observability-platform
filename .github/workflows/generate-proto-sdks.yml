name: Generate Protobuf SDKs

on:
  push:
    branches: [ main, master, feature/polyglot-sdk-pipeline ]
    paths:
      - 'packages/python/instrumentation-sdk/contracts/proto/v1/**'
      - 'buf.gen.yaml'
  pull_request:
    paths:
      - 'packages/python/instrumentation-sdk/contracts/proto/v1/**'
      - 'buf.gen.yaml'
  workflow_dispatch:

jobs:
  generate:
    name: Generate and Sync SDK Clients
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Buf CLI
        run: npm install -g @bufbuild/buf

      - name: Lint Protobuf Contract
        run: buf lint packages/python/instrumentation-sdk/contracts/proto/v1

      - name: Check for Breaking Changes
        run: |
          buf breaking packages/python/instrumentation-sdk/contracts/proto/v1 --against "https://github.com/${{ github.repository }}.git#branch=${{ github.event.repository.default_branch }}"
        continue-on-error: true

      - name: Run Code Generation
        run: buf generate packages/python/instrumentation-sdk/contracts/proto/v1

      - name: Commit and Push Generated Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(proto): auto-regenerate SDK clients for multiple languages"
          file_pattern: 'packages/*/instrumentation-sdk/src/infra/clients/v1/**'
          commit_user_name: "GitHub Action"
          commit_user_email: "actions@github.com"
          commit_author: "GitHub Action <actions@github.com>"
