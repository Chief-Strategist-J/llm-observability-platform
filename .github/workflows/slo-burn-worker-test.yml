name: Test Enforcement (SLO Burn Worker)

on:
  push:
    branches:
      - main
      - "feature/slo-burn-worker"
      - "feature/slo-burn-worker/**"
    paths:
      - "packages/python/slo-burn-worker/**"
      - ".github/workflows/slo-burn-worker-test.yml"
  pull_request:
    branches:
      - main
    paths:
      - "packages/python/slo-burn-worker/**"
      - ".github/workflows/slo-burn-worker-test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Unit Tests + Type Checks + Lint
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: "Unit Tests · Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: packages/python/slo-burn-worker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: packages/python/slo-burn-worker/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check src/ tests/

      - name: Type check with Mypy
        run: mypy src/ --ignore-missing-imports --strict

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            --cov=worker \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: packages/python/slo-burn-worker/coverage.xml
          retention-days: 7
