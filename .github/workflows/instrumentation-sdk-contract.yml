name: Contract Enforcement (Instrumentation SDK)

on:
  push:
    paths:
      - 'packages/python/instrumentation-sdk/**'
  pull_request:
    paths:
      - 'packages/python/instrumentation-sdk/**'

jobs:
  check-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd packages/python/instrumentation-sdk
          pip install pydantic

      - name: Run contract check
        run: |
          cd packages/python/instrumentation-sdk
          python scripts/check_contract.py
