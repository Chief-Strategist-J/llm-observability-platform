name: Test Enforcement (Budget Provisioner)

on:
  push:
    branches:
      - main
    paths:
      - 'packages/python/budget-provisioner/**'

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd packages/python/budget-provisioner
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          cd packages/python/budget-provisioner
          pytest
