name: CI/CD Pipeline - Code Quality Infrastructure

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'infrastructure/code-quality/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'infrastructure/code-quality/**'

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # Job 1: Run tests with coverage and Allure reporting
  test-and-report:
    name: Run Tests & Generate Reports
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./infrastructure/code-quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better reports

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            infrastructure/code-quality/deployment/docker/requirements.txt
            infrastructure/code-quality/deployment/docker/requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r deployment/docker/requirements.txt
          pip install -r deployment/docker/requirements-dev.txt
          pip install pytest-cov coverage

      - name: Run Domain Tests with Coverage
        run: |
          python -m pytest tests/test_domain/ \
            --cov=domain \
            --cov-report=xml:coverage-domain.xml \
            --cov-report=html:coverage-domain \
            --cov-report=term-missing \
            -v \
            --tb=short
          # Save coverage data
          cp .coverage .coverage-domain

      - name: Run Application Tests with Coverage
        run: |
          python -m pytest tests/test_application/ \
            --cov=application \
            --cov-report=xml:coverage-application.xml \
            --cov-report=html:coverage-application \
            --cov-report=term-missing \
            -v \
            --tb=short
          # Save coverage data
          cp .coverage .coverage-application

      - name: Run Critical Production Tests
        run: |
          python -m pytest tests/test_critical/ \
            -v \
            --tb=short

      - name: Run Analysis Tools Tests
        run: |
          python -m pytest tests/test_analysis_tools/ \
            -v \
            --tb=short || true

      - name: Generate Combined Coverage Report
        run: |
          
          # Combine coverage reports
          coverage combine .coverage-domain .coverage-application
          
          # Generate final coverage report
          coverage xml -o coverage-final.xml
          coverage html -d coverage-final
          coverage report

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./infrastructure/code-quality/coverage-final.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            infrastructure/code-quality/coverage-final/
            infrastructure/code-quality/coverage-*.xml
          retention-days: 30

      # On PRs: post allure comment on the PR
      - name: Post Allure Report to PR
        if: github.event_name == 'pull_request'
        uses: allure-framework/allure-action@v0
        with:
          results-directory: ./infrastructure/code-quality/allure-results
          issue-name: "Test Results — PR #${{ github.event.pull_request.number }}"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # On push to main: generate single-file report (no CORS, opens anywhere)
      - name: Install Allure CLI
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npm install -g allure-commandline

      - name: Generate Allure Report (single-file)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cd infrastructure/code-quality
          allure generate allure-results --single-file --clean -o allure-report

      # Upload as artifact — downloads and opens directly in browser, no server needed
      - name: Upload Allure Report Artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: infrastructure/code-quality/allure-report/index.html   # single file only, not the whole folder
          retention-days: 30

      # Also deploy to GitHub Pages for permanent URL access
      - name: Deploy Allure Report to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./infrastructure/code-quality/allure-report
          destination_dir: allure-report
          keep_files: true                 # don't wipe previous reports on each deploy


  
  