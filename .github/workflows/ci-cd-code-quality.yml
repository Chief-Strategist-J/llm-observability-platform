name: CI/CD Pipeline - Code Quality Infrastructure

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'infrastructure/code-quality/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'infrastructure/code-quality/**'

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  test-and-report:
    name: Run Tests & Generate Reports
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
      statuses: write

    defaults:
      run:
        working-directory: ./infrastructure/code-quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            infrastructure/code-quality/deployment/docker/requirements.txt
            infrastructure/code-quality/deployment/docker/requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r deployment/docker/requirements.txt
          pip install -r deployment/docker/requirements-dev.txt
          pip install pytest-cov coverage pytest-json-report pytest-html

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Run Domain Tests with Coverage
        run: |
          python -m pytest tests/test_domain/ \
            --cov=domain \
            --cov-report=xml:coverage-domain.xml \
            --cov-report=html:coverage-domain \
            --cov-report=term-missing \
            --alluredir=allure-results \
            --html=reports/html/domain-report.html \
            --self-contained-html \
            --json-report \
            --json-report-file=reports/json/domain-report.json \
            -v \
            --tb=short
          cp .coverage .coverage-domain

      - name: Run Application Tests with Coverage
        run: |
          python -m pytest tests/test_application/ \
            --cov=application \
            --cov-report=xml:coverage-application.xml \
            --cov-report=html:coverage-application \
            --cov-report=term-missing \
            --alluredir=allure-results \
            --html=reports/html/application-report.html \
            --self-contained-html \
            --json-report \
            --json-report-file=reports/json/application-report.json \
            -v \
            --tb=short
          cp .coverage .coverage-application

      - name: Run Critical Production Tests
        run: |
          python -m pytest tests/test_critical/ \
            --alluredir=allure-results \
            --html=reports/html/critical-report.html \
            --self-contained-html \
            --json-report \
            --json-report-file=reports/json/critical-report.json \
            -v \
            --tb=short

      - name: Run Analysis Tools Tests
        run: |
          python -m pytest tests/test_analysis_tools/ \
            --alluredir=allure-results \
            --html=reports/html/analysis-report.html \
            --self-contained-html \
            --json-report \
            --json-report-file=reports/json/analysis-report.json \
            -v \
            --tb=short || true

      - name: Generate Combined Coverage Report
        run: |
          coverage combine .coverage-domain .coverage-application
          coverage xml -o coverage-final.xml
          coverage html -d coverage-final
          coverage report

      - name: Generate Allure Report
        if: always()
        run: |
          allure generate allure-results --single-file --clean -o allure-report
          cp allure-report/index.html reports/allure-report.html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./infrastructure/code-quality/coverage-final.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload Allure Results (raw)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-raw
          path: infrastructure/code-quality/allure-results
          retention-days: 2

      - name: Upload Allure Report (single-file HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: infrastructure/code-quality/allure-report/index.html
          retention-days: 7

      - name: Upload pytest HTML Reports (self-contained, open offline)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-html-reports
          path: infrastructure/code-quality/reports/html/
          retention-days: 7

      - name: Upload pytest JSON Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-json-reports
          path: infrastructure/code-quality/reports/json/
          retention-days: 7

      - name: Upload Coverage HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report
          path: infrastructure/code-quality/coverage-final/
          retention-days: 7

      - name: Upload Coverage XML Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-reports
          path: |
            infrastructure/code-quality/coverage-final.xml
            infrastructure/code-quality/coverage-domain.xml
            infrastructure/code-quality/coverage-application.xml
          retention-days: 7

      - name: Post PR Summary Comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            function parseCoverage(xmlPath, label) {
              if (!fs.existsSync(xmlPath)) return null;
              const xml = fs.readFileSync(xmlPath, 'utf8');
              const lineRate   = parseFloat((xml.match(/line-rate="([\d.]+)"/)   || [])[1] || 0);
              const branchRate = parseFloat((xml.match(/branch-rate="([\d.]+)"/) || [])[1] || 0);
              const stmts      = parseInt((xml.match(/statements="(\d+)"/)       || [])[1] || 0);
              const miss       = parseInt((xml.match(/missing="(\d+)"/)          || [])[1] || 0);
              const pct        = v => `${(v * 100).toFixed(1)}%`;
              const badge      = v => v >= 0.9 ? '🟢' : v >= 0.7 ? '🟡' : '🔴';
              return { label, lineRate, branchRate, stmts, miss, pct, badge };
            }

            function parseJson(jsonPath) {
              if (!fs.existsSync(jsonPath)) return null;
              try {
                const data = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
                return {
                  total:   data.summary?.total   ?? 0,
                  passed:  data.summary?.passed  ?? 0,
                  failed:  data.summary?.failed  ?? 0,
                  error:   data.summary?.error   ?? 0,
                  skipped: data.summary?.skipped ?? 0,
                  duration: data.duration        ?? 0,
                };
              } catch { return null; }
            }

            const coverages = [
              parseCoverage('infrastructure/code-quality/coverage-domain.xml',      'Domain'),
              parseCoverage('infrastructure/code-quality/coverage-application.xml', 'Application'),
              parseCoverage('infrastructure/code-quality/coverage-final.xml',       '**Combined**'),
            ].filter(Boolean);

            const suites = [
              { label: 'Domain',         json: 'infrastructure/code-quality/reports/json/domain-report.json' },
              { label: 'Application',    json: 'infrastructure/code-quality/reports/json/application-report.json' },
              { label: 'Critical',       json: 'infrastructure/code-quality/reports/json/critical-report.json' },
              { label: 'Analysis Tools', json: 'infrastructure/code-quality/reports/json/analysis-report.json' },
            ].map(s => ({ label: s.label, ...parseJson(s.json) })).filter(s => s.total !== undefined);

            const totalTests  = suites.reduce((a, s) => a + s.total,   0);
            const totalPassed = suites.reduce((a, s) => a + s.passed,  0);
            const totalFailed = suites.reduce((a, s) => a + s.failed,  0);
            const totalSkip   = suites.reduce((a, s) => a + s.skipped, 0);
            const overallIcon = totalFailed === 0 ? '✅' : '❌';

            const suiteRows = suites.map(s => {
              const icon = s.failed === 0 ? '✅' : '❌';
              return `| ${icon} ${s.label} | ${s.total} | ${s.passed} | ${s.failed} | ${s.skipped} | ${s.duration.toFixed(1)}s |`;
            }).join('\n');

            const covRows = coverages.map(c =>
              `| ${c.badge(c.lineRate)} ${c.label} | ${c.pct(c.lineRate)} | ${c.pct(c.branchRate)} | ${c.stmts} | ${c.miss} |`
            ).join('\n');

            const runUrl  = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const prNum   = context.payload.pull_request.number;

            const body = [
              `## ${overallIcon} Test Report — PR #${prNum}`,
              '',
              `> Run: [#${context.runId}](${runUrl}) · Commit: \`${context.sha.slice(0,7)}\``,
              '',
              '---',
              '',
              '### 🧪 Test Suite Results',
              '',
              '| Suite | Total | ✅ Passed | ❌ Failed | ⏭ Skipped | ⏱ Duration |',
              '|---|---|---|---|---|---|',
              suiteRows,
              `| **Total** | **${totalTests}** | **${totalPassed}** | **${totalFailed}** | **${totalSkip}** | — |`,
              '',
              '---',
              '',
              '### 📈 Coverage',
              '',
              '| Module | Lines | Branches | Statements | Missed |',
              '|---|---|---|---|---|',
              covRows,
              '',
              '---',
              '',
              '### 📦 Downloadable Reports',
              '',
              '| Report | Format | How to open |',
              '|---|---|---|',
              `| 🧪 Allure Test Report | Single-file HTML | Download \`allure-report\` → open \`index.html\` in browser |`,
              `| 🐍 Domain pytest Report | Self-contained HTML | Download \`pytest-html-reports\` → open \`domain-report.html\` |`,
              `| 🐍 Application pytest Report | Self-contained HTML | Download \`pytest-html-reports\` → open \`application-report.html\` |`,
              `| 🐍 Critical pytest Report | Self-contained HTML | Download \`pytest-html-reports\` → open \`critical-report.html\` |`,
              `| 🐍 Analysis pytest Report | Self-contained HTML | Download \`pytest-html-reports\` → open \`analysis-report.html\` |`,
              `| 📊 Coverage HTML Report | Multi-file HTML | Download \`coverage-html-report\` → open \`index.html\` |`,
              `| 📄 Coverage XML (combined) | XML (CI/SonarQube) | Download \`coverage-xml-reports\` → \`coverage-final.xml\` |`,
              `| 📄 Coverage XML (domain) | XML | Download \`coverage-xml-reports\` → \`coverage-domain.xml\` |`,
              `| 📄 Coverage XML (application) | XML | Download \`coverage-xml-reports\` → \`coverage-application.xml\` |`,
              `| 🗂 pytest JSON Reports | JSON (raw data) | Download \`pytest-json-reports\` |`,
              `| 🗂 Allure Raw Results | JSON (Allure format) | Download \`allure-results-raw\` |`,
              '',
              `> All artifacts available under [Actions → this run → Artifacts](${runUrl})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: prNum,
            });
            for (const c of comments) {
              if (c.user.type === 'Bot' && c.body.startsWith('## ') && c.body.includes('Test Report')) {
                await github.rest.issues.deleteComment({ ...context.repo, comment_id: c.id });
              }
            }

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: prNum,
              body,
            });

      - name: Deploy Allure Report to GitHub Pages (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./infrastructure/code-quality/allure-report
          destination_dir: allure-report
          keep_files: true