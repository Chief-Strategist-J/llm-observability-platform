workers:
  - name: instrumentation-sdk-api
    type: service
    language: python
    owner: "@data-team"
    stage: 1
    endpoints:
      - /instrumentation/init
      - /instrumentation/uninstrument
      - /instrumentation/detect
      - /instrumentation/test-call
      - /streaming/test-stream-call
      - /v1/sampling/should-sample
      - /v1/embeddings/embed
      - /v1/spans
      - /v1/fallback/track
      - /v1/fallback/clear
      - /v1/tool-call/track
      - /v1/tool-call/clear
      - /v1/metrics/prices
      - /v1/metrics/prices/reload
