  - id: awk_composite_score_histogram
    type: shell
    tool: awk
    query: "docker exec quality-engine-postgres psql -U postgres -d quality_engine_db -t -c 'SELECT composite_score FROM quality_scores WHERE scored_at > now() - interval' \"'\" '1 hour' \"'\" ';' 2>/dev/null | awk '{b=int($1*10)/10; hist[b]++} END {for (i=0; i<=9; i++) {b=i/10; printf \"[%.1f-%.1f]: %d\\n\", b, b+0.1, hist[b]+0}}' | sort"
    description: "Build a 10-bucket histogram of composite scores from the last hour entirely in awk."
    importance: "Reveals score distribution shape (bimodal, skewed low) without needing Grafana. A bucket near 0.0–0.1 with high count signals a systematic scorer failure."
