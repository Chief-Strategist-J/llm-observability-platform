    type: shell
    tool: sed
    query: "grep -A2 'ports:' /home/btpl-lap-22/live/obs/docker-compose.yml | sed -nE 's/.*-[[:space:]]+\"?([0-9]+):([0-9]+)\"?.*/host=\\1 container=\\2/p'"
    description: "Extract all host:container port mappings from docker-compose.yml in a normalized key=value format."
