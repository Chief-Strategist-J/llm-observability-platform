# Queries for Feature: human_review
feature: human_review
description: "Human-in-the-loop review queue management, toxic span confirmation, and SLO metrics tracking."

queries:
  - id: pg_review_queue
    type: postgresql
    query: "SELECT span_id, model, composite_score, review_status, scored_at FROM quality_scores WHERE review_status = 'pending' ORDER BY scored_at ASC;"
    description: "Get the queue of spans pending human review."
    importance: "Allows developers and human reviewers to list and pull items that need manual auditing."
    expected_output: "List of span rows with pending status, scores, and timestamps."
    how_to_use: "docker exec -it quality-engine-postgres psql -U postgres -d quality_engine_db -c \"<query>\""

  - id: pg_confirmed_issues
    type: postgresql
    query: "SELECT span_id, model, composite_score, reviewed_at FROM quality_scores WHERE review_status = 'confirmed_toxic' ORDER BY reviewed_at DESC;"
    description: "View spans with confirmed toxicity or issues by reviewers."
    importance: "Allows engineering to inspect real confirmed hallucination/toxic examples to patch model prompts."
    expected_output: "Confirmed failure spans with reviewed timestamps."
    how_to_use: "docker exec -it quality-engine-postgres psql -U postgres -d quality_engine_db -c \"<query>\""

  - id: pg_review_duration_slo_check
    type: postgresql
    query: "SELECT span_id, model, scored_at, reviewed_at, (reviewed_at - scored_at) as review_duration, CASE WHEN (reviewed_at - scored_at) < interval '24 hours' THEN 'MEETS_SLO' ELSE 'BREACHES_SLO' END as slo_status FROM quality_scores WHERE review_status != 'pending';"
    description: "SQL query calculating exact review duration and checking if it meets the 24-hour SLO."
    importance: "Audits contractual human-in-the-loop response targets (SLO-Q-03 target: >95% reviewed within 24 hours)."
    expected_output: "Table with span_id, model, review duration (e.g. 02:45:12), and SLO classification ('MEETS_SLO' / 'BREACHES_SLO')."
    how_to_use: "docker exec -it quality-engine-postgres psql -U postgres -d quality_engine_db -c \"<query>\""

  - id: pg_review_conversion_rates
    type: postgresql
    query: "SELECT review_status, count(*), round(count(*)::numeric / sum(count(*)) over() * 100, 2) as percentage FROM quality_scores GROUP BY review_status;"
    description: "Retrieve confirmation conversion rates (e.g. what percentage of flagged spans are actual positive failures)."
    importance: "Measures precision of automated guardrails. High percentage of false positives means thresholds are too tight."
    expected_output: "List of review statuses with their absolute counts and respective percentages of the total dataset."
    how_to_use: "docker exec -it quality-engine-postgres psql -U postgres -d quality_engine_db -c \"<query>\""

  - id: prom_review_slo
    type: promql
    query: "quality_review_slo_ratio * 100"
    description: "The percentage of items in the human review queue processed within 24 hours (SLO-Q-03 target: >95%)."
    importance: "Tracks SLO adherence dynamically. Drops below 95% raise high-priority infrastructure alerts."
    expected_output: "Percentage value (e.g., 98.4)."
    how_to_use: "Execute in Prometheus or Grafana."

  - id: prom_review_decisions
    type: promql
    query: "sum(quality_review_decisions_total) by (status)"
    description: "Aggregation of review choices (confirmed vs false_positive)."
    importance: "Monitors human auditor workload and output decisions."
    expected_output: "Bar graph or metric value showing decisions count."
    how_to_use: "Execute in Prometheus or Grafana."

  - id: pg_stale_pending_reviews
    type: postgresql
    query: "SELECT span_id, model, composite_score, quality_flags, scored_at, now() - scored_at as age FROM quality_scores WHERE review_status = 'pending' AND scored_at < now() - interval '24 hours' ORDER BY scored_at ASC;"
    description: "List all pending review items that have been waiting more than 24 hours (SLO breach candidates)."
    importance: "These are the exact items that will breach SLO-Q-03 if not actioned. Use this as the daily reviewer triage queue."
    expected_output: "Rows with span details and age column showing how long each has been waiting (e.g. '1 day 04:12:00')."
    how_to_use: "docker exec -it quality-engine-postgres psql -U postgres -d quality_engine_db -c \"<query>\""

  - id: pg_reviewer_workload
    type: postgresql
    query: "SELECT reviewed_by, count(*) as total_reviewed, sum(CASE WHEN review_status = 'confirmed_toxic' THEN 1 ELSE 0 END) as confirmed, sum(CASE WHEN review_status = 'false_positive' THEN 1 ELSE 0 END) as rejected, avg(reviewed_at - scored_at) as avg_time_to_review FROM quality_scores WHERE review_status != 'pending' AND reviewed_by IS NOT NULL GROUP BY reviewed_by ORDER BY total_reviewed DESC;"
    description: "Per-reviewer breakdown of decision counts, confirmation rate, and average review turnaround time."
    importance: "Identifies uneven reviewer workload distribution and outlier reviewers with very high/low confirmation rates (possible calibration drift)."
    expected_output: "Table with reviewer ID, totals, confirmation/rejection split, and average review time."
    how_to_use: "docker exec -it quality-engine-postgres psql -U postgres -d quality_engine_db -c \"<query>\""

  - id: prom_review_queue_depth
    type: promql
    query: "quality_review_queue_depth"
    description: "Current number of spans sitting in the pending human review queue."
    importance: "Queue depth is the leading indicator of SLO risk. Depth >200 with no downward trend requires reviewer escalation."
    expected_output: "Gauge showing current pending count. Alert if queue exceeds 200 for more than 30 minutes."
    how_to_use: "Execute in Prometheus or Grafana."

  - id: trace_review_submission
    type: traceql
    query: '{resource.service.name="quality-engine" && name="human_review.submit"}'
    description: "Find traces for review submission API calls, including reviewer identity and decision payload."
    importance: "Audits latency and correctness of the review submission path. Slow writes here delay the SLO clock from stopping."
    expected_output: "Traces containing human_review.submit span with attributes: reviewer_id, decision, span_id."
    how_to_use: "Query in Grafana Tempo Explorer."

  - id: pg_false_positive_by_flag
    type: postgresql
    query: "SELECT unnest(quality_flags) as flag, count(*) as total_flagged, sum(CASE WHEN review_status = 'false_positive' THEN 1 ELSE 0 END) as false_positives, round(sum(CASE WHEN review_status = 'false_positive' THEN 1 ELSE 0 END)::numeric / count(*) * 100, 2) as fp_rate FROM quality_scores WHERE review_status IN ('confirmed_toxic', 'false_positive') GROUP BY flag ORDER BY fp_rate DESC;"
    description: "False positive rate per quality flag — how often each flag type is overturned by a human reviewer."
    importance: "High FP rate on a specific flag (e.g. >60% for HALLUCINATION_RISK) means that guardrail threshold is too aggressive and needs recalibration."
    expected_output: "Table ranked by fp_rate descending — flags with highest overturn rates at the top."
    how_to_use: "docker exec -it quality-engine-postgres psql -U postgres -d quality_engine_db -c \"<query>\""
