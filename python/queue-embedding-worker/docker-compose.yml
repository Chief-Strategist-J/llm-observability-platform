version: '3.9'
services:
  queue-embedding-worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      CF_ACCOUNT_ID: local-account
      CF_QUEUE_NAME: span-enrichment
      EMBEDDING_DIMENSIONS: 1536
      WORKER_CONCURRENCY: 5
      WORKER_RATE_LIMIT_PER_SEC: 50
      WORKER_BACKOFF_MS: 500
      EMBEDDING_PROVIDER: cloudflare
      DEPLOYMENT_ENV: dev
    command: ["bash", "scripts/run.sh"]
