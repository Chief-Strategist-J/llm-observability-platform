site_name: LLM Observability SDK
site_url: https://llm-observability-platform.readthedocs.io
site_description: Python SDK for capturing, enriching, and analyzing LLM call telemetry with zero-to-minimal code changes.
site_author: Jaydeep Wagh
repo_url: https://github.com/Chief-Strategist-J/llm-observability-platform
repo_name: Chief-Strategist-J/llm-observability-platform

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - admonition

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
    - Installation & Quick Start: Installation-and-Quick-Start.md
  - Instrumentation:
    - Auto-Instrumentation: Auto-Instrumentation.md
    - Manual Spans — Decorator: Manual-Spans-Decorator.md
    - Manual Spans — Context Manager: Manual-Spans-Context-Manager.md
    - Streaming Observability: Streaming-Observability.md
  - Features:
    - PII & Injection Scanning: PII-and-Injection-Scanning.md
    - Deterministic Sampling: Deterministic-Sampling.md
    - MiniLM Embeddings: MiniLM-Embeddings.md
    - Prometheus Metrics & Grafana: Prometheus-Metrics-and-Grafana.md
  - Reference:
    - REST Management API: REST-Management-API.md
    - Docker & CLI Deployment: Docker-and-CLI-Deployment.md
    - Config Files Reference: Config-Files-Reference.md
