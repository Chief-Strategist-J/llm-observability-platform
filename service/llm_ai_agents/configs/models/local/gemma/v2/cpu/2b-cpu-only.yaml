model:
  id: google/gemma-2-2b-it
  name: Gemma v2 2B (CPU Optimized)
  version: v2
  size: 2b
  provider: local
  backend: transformers
  parameters:
    temperature: 0.7
    top_p: 0.9
    max_tokens: 128
  resources:
    min_ram_gb: 6
    accelerator: cpu
  quantization: none
  device_map: cpu
  trust_remote_code: true
