version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./auth_data/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

  agent_runner:
    build: .
    container_name: llm_agent_runner
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - APP_TYPE=agent
      - AGENT_ID=researcher
      - MODEL_CONFIG=v2/gpu/9b-it
      - HF_TOKEN=${HF_TOKEN}
      - OLLAMA_HOST=http://ollama:11434
    deploy:
      resources:
        limits:
          memory: 32G
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - .:/app
      - ~/.cache/huggingface:/root/.cache/huggingface
    restart: on-failure

networks:
  default:
    name: llm_platform_network
