runbooks:
  - id: 2026-06-02-inference
    title: Toxicity Inference ONNX Evaluation
    category: research
    path: research/toxicity/2026-06-02-inference
    description: Verification of performance, complexity, failure modes, and threat models of the dual-pass toxicity inference strategy.

  - id: 20260603-001-declarative-safety-metrics-registry
    title: "ADR-001: Declarative Safety Metrics Registry Pattern"
    category: decisions
    status: accepted
    path: decisions/20260603-001-declarative-safety-metrics-registry.md
    package: packages/python/instrumentation-sdk
    branch: feature/toxicity-metrics-registry
    description: Records the decision to use a declarative registry pattern (MetricEvaluator + SAFETY_METRICS_REGISTRY) for all safety/security Prometheus metrics in the instrumentation SDK, replacing per-metric hardcoded methods.

  - id: 2026-06-03-dual-path-scoring
    title: Perplexity Dual-Path Scoring Evaluation
    category: research
    path: research/perplexity/2026-06-03-dual-path-scoring
    description: Empirical verification of token logprobs vs GPT-2 ONNX fallback inference, assessing latency bounds, memory overhead (OOM risk under 512Mi), and sequence length constraints.

  - id: 20260603-002-perplexity-dual-path-scoring
    title: "ADR-002: Perplexity Dual-Path Scoring and Fail-Safe Fallbacks"
    category: decisions
    status: accepted
    path: decisions/20260603-002-perplexity-dual-path-scoring.md
    package: packages/python/perplexity
    description: Records the architecture decision for the HTTP perplexity service, formalizing the zero-cost provider path and failure-first constraints of the GPT-2 ONNX fallback path.

  - id: 20260604-003-quality-baseline-worker
    title: "ADR-003: Quality Baseline and Trend Rollup Worker"
    category: decisions
    status: accepted
    path: decisions/20260604-003-quality-baseline-worker.md
    package: packages/python/quality-baseline-worker
    description: Records the architecture decision for the quality-baseline-worker, outlining the Temporal scheduled workflows and failure-first adapters for Postgres, ClickHouse, and Redis.

  - id: 2026-06-04-worker-evaluation
    title: Quality Baseline Worker Implementation and Rollup Verification
    category: research
    path: research/quality-baseline/2026-06-04-worker-evaluation
    description: Verification of rolling average calculations, Temporal activity executions, database adapters (Postgres, ClickHouse, Redis), and alerting thresholds for quality scores.

  - id: 2026-06-05-decoupling
    title: NLI Model Decoupling and Dynamic Warmup Evaluation
    category: research
    path: research/nli-worker/2026-06-05-decoupling
    description: Verification of model weight decoupling, in-memory registry caching latency bounds, cold-start spikes, and memory consumption under concurrency.

  - id: 20260605-004-nli-worker-decoupling
    title: "ADR-004: Model Registry Decoupling for NLI Worker"
    category: decisions
    status: accepted
    path: decisions/20260605-004-nli-worker-decoupling.md
    package: packages/python/nli-worker
    description: Records the decision to decouple the model weights from the NLI worker container image and implement a dynamic, thread-safe in-memory model registry.

  - id: 20260609-005-coherence-faithfulness-pipeline
    title: "ADR-005: Phase 2 Coherence + Faithfulness Pipeline Implementation"
    category: decisions
    status: accepted
    path: decisions/20260609-005-coherence-faithfulness-pipeline.md
    package: packages/python/quality-engine
    description: Records the architecture and design decisions for Phase 2 Coherence and Faithfulness metrics aggregation, dynamic weight renormalization, and database migration safety rules.



  - id: 20260612-006-pylow-polyglot-tracing-uni-code-index
    title: "ADR-006: pylow Polyglot Tracing, Universal uni Tool, and Code Index"
    category: decisions
    status: accepted
    path: decisions/20260612-006-pylow-polyglot-tracing-uni-code-index.md
    package: packages/python/pylow
    description: Records the decision to extend pylow tracing to Go/Rust/Java/TypeScript by orchestrating native tooling (dlv, perf, strace, jcmd, JFR, V8 inspector), add the universal uni build/run/debug/trace front door with unified file:line issue reporting, and add an incremental SQLite code index with ctags-preferred extraction.

  - id: 20260612-007-pylow-calltree-stepdebug-language-registry
    title: "ADR-007: pylow Exact Call Trees, Step Debugging, and the Declarative Language Registry"
    category: decisions
    status: accepted
    path: decisions/20260612-007-pylow-calltree-stepdebug-language-registry.md
    package: packages/python/pylow
    description: Records the decision to add exact noise-filtered call trees (calltree) and terminal step debugging with per-stop value snapshots (debug-steps), and to refactor all polyglot features onto a single declarative LanguageSpec registry with a marker-paced debugger driver.

  - id: 20260615-008-perplexity-baseline-degradation-alerts
    title: "ADR-008: Perplexity, Quality Baselines, and Degradation Alerts"
    category: decisions
    status: accepted
    path: decisions/20260615-008-perplexity-baseline-degradation-alerts.md
    package: packages/python/quality-engine
    branch: feature/phase-3-perplexity-baseline-degradation-alerts
    description: Records the architecture and design decisions for Phase 3 including dual-path perplexity scoring, 4-weight renormalized composite scoring, YAML-driven hot-reloading baselines, and quality degradation alert suppression on cold-starts.

  - id: 2026-06-15-degradation-alerts
    title: Perplexity Baselines and Quality Degradation Alerts Evaluation
    category: research
    path: research/perplexity/2026-06-15-degradation-alerts
    description: Verification of composite renormalization (4-weight system with perplexity), baseline watchdog file observers, and early-warning quality degradation alerts suppression gates.

  - id: 20260617-009-latency-engine-hardening
    title: "ADR-009: Latency Engine Hardening, Containerization, OTel Tracing, and CI Pipeline"
    category: decisions
    status: accepted
    path: decisions/20260617-009-latency-engine-hardening.md
    package: packages/python/latency-engine
    branch: feature/latency-engine-runbooks-decisions
    description: Records the architecture and design decisions for hardening the latency-engine, covering logarithmic DDSketch mapping, Protobuf-Base64 Redis cache serialization, OTel context propagation, and AsyncAPI validation.

  - id: 2026-06-17-latency-engine-hardening
    title: Latency Engine Hardening and Metric Accumulation Evaluation
    category: research
    path: research/latency-engine/2026-06-17-latency-engine-hardening
    description: Verification of logarithmic binning DDSketch accuracy, rolling TPOT updates, Redis memory buffering during outages, and child-span context propagation tracking.

  - id: 20260618-010-slo-burn-worker
    title: "ADR-010: SLO Burn Rate Evaluation and Multi-Window Alerting Worker"
    category: decisions
    status: accepted
    path: decisions/20260618-010-slo-burn-worker.md
    package: packages/python/slo-burn-worker
    branch: feature/slo-burn-worker
    description: Records the architecture and design decisions for the SLO Burn Rate worker, covering Temporal interval scheduling, multi-window burn rate computation, status-driven alerting, and Redis alert deduplication locks.

  - id: 2026-06-18-slo-burn-worker
    title: SLO Burn Rate worker Evaluation and Alert Routing Verification
    category: research
    path: research/slo-burn-worker/2026-06-18-slo-burn-worker
    description: Verification of three-window burn-rate math convergence, severity escalation thresholds, Redis TTL lock behavior, and ClickHouse baseline query fallbacks.



