runbooks:
  - id: 2026-06-02-inference
    title: Toxicity Inference ONNX Evaluation
    category: research
    path: research/toxicity/2026-06-02-inference
    description: Verification of performance, complexity, failure modes, and threat models of the dual-pass toxicity inference strategy.

  - id: 20260603-001-declarative-safety-metrics-registry
    title: "ADR-001: Declarative Safety Metrics Registry Pattern"
    category: decisions
    status: accepted
    path: decisions/20260603-001-declarative-safety-metrics-registry.md
    package: packages/python/instrumentation-sdk
    branch: feature/toxicity-metrics-registry
    description: Records the decision to use a declarative registry pattern (MetricEvaluator + SAFETY_METRICS_REGISTRY) for all safety/security Prometheus metrics in the instrumentation SDK, replacing per-metric hardcoded methods.

  - id: 2026-06-03-dual-path-scoring
    title: Perplexity Dual-Path Scoring Evaluation
    category: research
    path: research/perplexity/2026-06-03-dual-path-scoring
    description: Empirical verification of token logprobs vs GPT-2 ONNX fallback inference, assessing latency bounds, memory overhead (OOM risk under 512Mi), and sequence length constraints.

  - id: 20260603-002-perplexity-dual-path-scoring
    title: "ADR-002: Perplexity Dual-Path Scoring and Fail-Safe Fallbacks"
    category: decisions
    status: accepted
    path: decisions/20260603-002-perplexity-dual-path-scoring.md
    package: packages/python/perplexity
    description: Records the architecture decision for the HTTP perplexity service, formalizing the zero-cost provider path and failure-first constraints of the GPT-2 ONNX fallback path.

  - id: 20260604-003-quality-baseline-worker
    title: "ADR-003: Quality Baseline and Trend Rollup Worker"
    category: decisions
    status: accepted
    path: decisions/20260604-003-quality-baseline-worker.md
    package: packages/python/quality-baseline-worker
    description: Records the architecture decision for the quality-baseline-worker, outlining the Temporal scheduled workflows and failure-first adapters for Postgres, ClickHouse, and Redis.

  - id: 2026-06-04-worker-evaluation
    title: Quality Baseline Worker Implementation and Rollup Verification
    category: research
    path: research/quality-baseline/2026-06-04-worker-evaluation
    description: Verification of rolling average calculations, Temporal activity executions, database adapters (Postgres, ClickHouse, Redis), and alerting thresholds for quality scores.



